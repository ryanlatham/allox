name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build and verify release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.6"

      - name: Install pinned Python
        run: uv python install

      - name: Sync project
        run: uv sync --locked

      - name: Validate tag matches package version
        run: |
          expected="${GITHUB_REF_NAME#v}"
          actual="$(uv run python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )"
          test "$expected" = "$actual"

      - name: Run unit tests
        run: uv run python -m unittest discover -s tests -v

      - name: Run framework self-test
        run: uv run allox self-test

      - name: Build distributions
        run: uv build

      - name: Smoke test wheel
        run: uv run --isolated --no-project --with dist/*.whl -- allox self-test

      - name: Smoke test source distribution
        run: uv run --isolated --no-project --with dist/*.tar.gz -- allox self-test

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/allox/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.6"

      - name: Publish with Trusted Publishing
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple dist/*
